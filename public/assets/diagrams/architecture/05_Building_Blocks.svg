="662.5" y="541.7664">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="115.269" x="662.5" y="554.7215">CSV-Dateien einlesen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="158.4365" x="662.5" y="567.6766">MX+ / OCV-Format erkennen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="169.0068" x="662.5" y="580.6316">Lang- zu Breitformat pivotieren</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="162.438" x="662.5" y="593.5867">100+ PID-Varianten zuordnen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="140.0352" x="662.5" y="606.5418">Optionales Downsampling</text></g><!--entity cleaner--><g class="entity" data-qualified-name="data_block.cleaner" data-source-line="22" id="ent0004"><rect fill="#FFE0B2" height="136.5957" rx="5" ry="5" style="stroke:#FF6600;stroke-width:0.5;" width="207.7681" x="191.12" y="495.2166"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="87.6133" x="201.12" y="515.8513">data_cleaner.py</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="3.4805" x="201.12" y="528.8064">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="166.187" x="201.12" y="541.7615">Stromvorzeichen normalisieren</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="187.7681" x="201.12" y="554.7166">Ladeperiode automatisch erkennen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="172.7397" x="201.12" y="567.6716">(SOC-Anstieg + positiver Strom)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="174.625" x="201.12" y="580.6267">Daten interpolieren (100 Punkte)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="175.0923" x="201.12" y="593.5818">SOC- oder zeitbasiert resamplen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="159.8813" x="201.12" y="606.5369">Ladeinformationen berechnen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="137.8384" x="201.12" y="619.492">(Dauer, Energie, Leistung)</text></g><!--entity avl--><g class="entity" data-qualified-name="data_block.avl" data-source-line="24" id="ent0005"><rect fill="#FFE0B2" height="110.6855" rx="5" ry="5" style="stroke:#FF6600;stroke-width:0.5;" width="183.7915" x="434.1" y="508.1766"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="74.9106" x="444.1" y="528.8113">avl_parser.py</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="3.4805" x="444.1" y="541.7664">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="141.6357" x="444.1" y="554.7215">AVL HV-Check PDF parsen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="163.7915" x="444.1" y="567.6766">SOH-Referenzwert extrahieren</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="134.7231" x="444.1" y="580.6316">Zellspannungen auslesen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="131.0547" x="444.1" y="593.5867">Temperatur + km-Stand</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="140.0244" x="444.1" y="606.5418">Regex-basierte Extraktion</text></g><!--entity soh_calc--><g class="entity" data-qualified-name="soh_block.soh_calc" data-source-line="30" id="ent0007"><rect fill="#FFCC80" height="149.5508" rx="5" ry="5" style="stroke:#FF6600;stroke-width:0.5;" width="202.0317" x="424.98" y="724.8166"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="97.8936" x="434.98" y="745.4513">soh_calculator.py</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="3.4805" x="434.98" y="758.4064">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="96.0137" x="434.98" y="771.3615">6 SOH-Methoden:</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="92.2163" x="441.9409" y="784.3166">1. AVL (Referenz)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="175.0708" x="441.9409" y="797.2716">2. Kapazitaetsbasiert (Q/Q_nom)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="133.6812" x="441.9409" y="810.2267">3. SOHe (Energieintegral)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="138.585" x="441.9409" y="823.1818">4. SOHc (Ladungsintegral)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="137.022" x="441.9409" y="836.1369">5. Kombiniert (Mittelwert)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="161.3853" x="441.9409" y="849.092">6. SOH_R (Widerstandsbasiert)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="163.0555" x="434.98" y="862.047">SOC-Mapping (BMS &#8596; Display)</text></g><!--entity ica--><g class="entity" data-qualified-name="soh_block.ica" data-source-line="32" id="ent0008"><rect fill="#FFCC80" height="136.5957" rx="5" ry="5" style="stroke:#FF6600;stroke-width:0.5;" width="197.9067" x="662.05" y="731.2866"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="58.0991" x="672.05" y="751.9213">ica_dva.py</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="3.4805" x="672.05" y="764.8764">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="177.9067" x="672.05" y="777.8315">Inkrementelle Kapazitaetsanalyse</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="139.1865" x="679.0109" y="790.7866">dQ/dV vs. Spannung (ICA)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="130.1255" x="679.0109" y="803.7416">dV/dQ vs. Ladung (DVA)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="137.978" x="672.05" y="816.6967">Savitzky-Golay-Glaettung</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="125.9897" x="672.05" y="829.6518">Peak-Erkennung (scipy)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="102.5181" x="672.05" y="842.6069">Peak-Tracking fuer</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="110.9238" x="672.05" y="855.562">Degradationsanalyse</text></g><!--entity dcpulse--><g class="entity" data-qualified-name="soh_block.dcpulse" data-source-line="34" id="ent0009"><rect fill="#FFCC80" height="110.6855" rx="5" ry="5" style="stroke:#FF6600;stroke-width:0.5;" width="184.8926" x="894.55" y="744.2466"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="119.4102" x="904.55" y="764.8813">dc_pulse_analyzer.py</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="3.4805" x="904.55" y="777.8364">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="163.6948" x="904.55" y="790.7915">DC-Puls-Widerstandsmessung</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="122.7402" x="904.55" y="803.7466">HPPC-Methode (&#916;V/&#916;I)</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="164.8926" x="904.55" y="816.7016">Stromspruenge &gt; 1A erkennen</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="105.6709" x="904.55" y="829.6567">Median R_i pro Test</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="118.5615" x="904.55" y="842.6118">R_i Baseline-Vergleich</text></g><!--entity rule--><g class="entity" data-qualified-name="analysis_block.rule" data-source-line="40" id="ent0011"><rect fill="#FFE082" height="136.5957" rx="5" ry="5" style="stroke:#FF6600;stroke-width:0.5;" width="158.4023" x="449.8" y="1012.7066"/><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="131.3823" x="459.8" y="1033.3413">rule_analyzer_de/en.py</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="3.4805" x="459.8" y="1046.2964">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="127.2627" x="459.8" y="1059.2515">Regelbasierte Narrative:</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="117.2886" x="466.7609" y="1072.2066">- Batterie-Gesundheit</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="101.9487" x="466.7609" y="1085.1616">- Degradationsrate</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="6