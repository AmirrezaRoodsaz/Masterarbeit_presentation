27" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="266" x="460" y="234"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="167.2607" x="509.3696" y="243.7002">Methode 3a: SOHe (Energiebasiert)</text></g><!--cluster m3b--><g class="cluster" data-qualified-name="m3b" data-source-line="28" id="ent0010"><rect fill="#D1FAE5" height="127" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="268" x="766" y="234"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="177.7832" x="811.1084" y="243.7002">Methode 3b: SOHc (Coulomb-basiert)</text></g><!--cluster m4--><g class="cluster" data-qualified-name="m4" data-source-line="32" id="ent0012"><rect fill="#FFF3CD" height="87" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="236" x="490" y="423"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="108.335" x="553.8325" y="432.7002">Methode 4: Kombiniert</text></g><!--cluster m5--><g class="cluster" data-qualified-name="m5" data-source-line="36" id="ent0014"><rect fill="#FDE8E8" height="117" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="293" x="766" y="408"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="192.251" x="816.3745" y="417.7002">Methode 5: SOH_R (Widerstandsbasiert)</text></g><!--cluster m6--><g class="cluster" data-qualified-name="m6" data-source-line="40" id="ent0016"><rect fill="#FDE8E8" height="131" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="246" x="1099" y="401"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="166.1572" x="1138.9214" y="410.7002">Methode 6: ICA/DVA (Peakanalyse)</text></g><!--cluster result--><g class="cluster" data-qualified-name="result" data-source-line="56" id="ent0026"><rect fill="#2C3E50" height="97" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="208" x="684" y="572"/><text fill="#FFFFFF" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="42.7881" x="766.606" y="581.7002">Ergebnis</text></g><!--entity in_data--><g class="entity" data-qualified-name="input.in_data" data-source-line="12" id="ent0003"><rect fill="#DBEAFE" height="46" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="132.2607" x="704.87" y="124"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="112.2607" x="714.87" y="134.7002">Spannung U(t), Strom I(t)</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="106.6748" x="714.87" y="144.7002">SOC(t), Temperatur T(t)</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="81.1377" x="714.87" y="154.7002">Zeit t, Energie E(t)</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="61.6895" x="714.87" y="164.7002">Kapazit&#228;t Q(t)</text></g><!--entity m1d--><g class="entity" data-qualified-name="m1.m1d" data-source-line="17" id="ent0005"><rect fill="#EDE9FE" height="26" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="200.6348" x="35.68" y="460"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="157.8369" x="45.68" y="470.7002">SOH_AVL aus AVL HV-Check PDF</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="180.6348" x="45.68" y="480.7002">(Externer Referenzwert, nicht berechnet)</text></g><!--entity m2d--><g class="entity" data-qualified-name="m2.m2d" data-source-line="21" id="ent0007"><rect fill="#EFF6FF" height="46" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="195.6396" x="181.18" y="281"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="175.6396" x="191.18" y="291.7002">SOH = (Q_aktuell / Q_nominal) &#215; 100%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="2.7783" x="191.18" y="301.7002">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="165.8936" x="191.18" y="311.7002">Q_aktuell: BMS-Wert bei SOC &gt; 90%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="173.4131" x="191.18" y="321.7002">Q_nominal: Herstellerangabe (77 kWh)</text></g><!--entity m3ad--><g class="entity" data-qualified-name="m3a.m3ad" data-source-line="25" id="ent0009"><rect fill="#F0FDF4" height="66" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="198.9844" x="483.51" y="271"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="28.3447" x="493.51" y="281.7002">Direkt</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="53.3545" x="524.633" y="281.7002">(bevorzugt):</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="178.9844" x="493.51" y="291.7002">SOHe = (E_aktuell / E_nominal) &#215; 100%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="2.7783" x="493.51" y="301.7002">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="51.665" x="493.51" y="311.7002">Integration</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="46.6748" x="547.9534" y="311.7002">(Fallback):</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="178.2959" x="493.51" y="321.7002">SOHe = &#8747;(U &#215; |I|) dt / E_nominal &#215; 100%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="60.0195" x="493.51" y="331.7002">(Trapezregel)</text></g><!--entity m3bd--><g class="entity" data-qualified-name="m3b.m3bd" data-source-line="29" id="ent0011"><rect fill="#F0FDF4" height="66" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="200.6396" x="789.68" y="271"/><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="28.3447" x="799.68" y="281.7002">Direkt</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="53.3545" x="830.803" y="281.7002">(bevorzugt):</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="180.6396" x="799.68" y="291.7002">SOHc = (Q_aktuell / Q_nominal) &#215; 100%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="2.7783" x="799.68" y="301.7002">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="10" font-weight="bold" lengthAdjust="spacing" textLength="51.665" x="799.68" y="311.7002">Integration</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="46.6748" x="854.1234" y="311.7002">(Fallback):</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="153.5645" x="799.68" y="321.7002">SOHc = &#8747;|I| dt / Q_nominal &#215; 100%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="86.1475" x="799.68" y="331.7002">(Coulomb-Z&#228;hlung)</text></g><!--entity m4d--><g class="entity" data-qualified-name="m4.m4d" data-source-line="33" id="ent0013"><rect fill="#FEF3C7" height="26" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="168.9355" x="513.53" y="460"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="148.9355" x="523.53" y="470.7002">SOH_komb = (SOHe + SOHc) / 2</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="131.7041" x="523.53" y="480.7002">(Gleichgewichteter Mittelwert)</text></g><!--entity m5d--><g class="entity" data-qualified-name="m5.m5d" data-source-line="37" id="ent0015"><rect fill="#FEE2E2" height="56" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="226.2158" x="789.89" y="445"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="206.2158" x="799.89" y="455.7002">SOH_R = (R_i_Baseline / R_i_aktuell) &#215; 100%</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="2.7783" x="799.89" y="465.7002">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="143.8428" x="799.89" y="475.7002">R_i = |&#916;U / &#916;I| (HPPC-Methode)</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="151.7285" x="799.89" y="485.7002">Baseline: Erster Test als Referenz</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="139.5215" x="799.89" y="495.7002">Median &#252;ber alle Stromspr&#252;nge</text></g><!--entity m6d--><g class="entity" data-qualified-name="m6.m6d" data-source-line="41" id="ent0017"><rect fill="#FEE2E2" height="70" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="178.3984" x="1122.8" y="438"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="153.3887" x="1132.8" y="448.7002">ICA: dQ/dV vs. U &#8594; Peak-Position</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="158.3984" x="1132.8" y="458.7002">DVA: dU/dQ vs. Q &#8594; Wendepunkte</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="2.7783" x="1132.8" y="468.7002">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="129.5166" x="1132.8" y="478.7002">Peak-Verschiebung &#252;ber Zeit</text><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="148.5791" x="1132.8" y="491.7803">Degradationsindikator</text><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="114.4775" x="1132.8" y="502.7002">(Savitzky-Golay-Gl&#228;ttung)</text></g><!--entity res--><g class="entity" data-qualified-name="result.res" data-source-line="57" id="ent0027"><rect fill="#4B5563" height="36" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="140.6006" x="707.7" y="609"/><text fill="#FFFFFF" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="120.6006" x="717.7" y="619.7002">SOH-Werte aller Methoden</text><text fill="#FFFFFF" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="104.7754" x="717.7" y="629.7002">+ Divergenz-Bewertung</text><text fill="#FFFFFF" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="97.002" x="717.7" y="639.7002">+ Qualit&#228;tsindikatoren</text></g><!--link input to m1--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="45" id="lnk18"><path d="M865.1599,194.2423 C865.0686,194.4405 864.9763,194.638 864.8828,194.8349 C864.6957,195.2287 864.5041,195.62 864.3078,196.0085 C863.9152,196.7855 863.5037,197.5514 863.0726,198.3041 C862.2103,199.8095 861.2694,201.2623 860.2428,202.6465 C858.1895,205.4148 855.7938,207.9088 853,210 C837.7,221.45 178.44,204.41 165,218 C115.32,268.26 117.37,324.79 165,377 C178.08,391.34 237.38,372.22 252,385 C259.3525,391.425 264.2975,399.9569 267.5747,409.1695 C268.394,411.4727 269.109,413.8184 269.7314,416.1844 C270.0426,417.3674 270.3306,418.5554 270.5969,419.7458 C270.7301,420.3409 270.8578,420.9367 270.9802,421.5326 C271.0415,421.8306 271.1014,422.1287 271.16,422.4267 C271.1893,422.5757 2