acing" textLength="219.0278" x="707.49" y="225.4702">&#8226; Abtastrate: ~80 ms (Strom) bis ~1 s (Temp)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="167.1055" x="707.49" y="236.4702">&#8226; H&#246;chster Aufwand (2-4 Stunden)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="208.6777" x="707.49" y="247.4702">&#8226; Beste Datenbasis f&#252;r alle SOH-Methoden</text></g><!--entity eignung_d--><g class="entity" data-qualified-name="eignung.eignung_d" data-source-line="30" id="ent0013"><rect fill="#EDE9FE" height="131" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="289.0112" x="300.49" y="355"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="42.8076" x="313.5462" y="368.4702">Methode</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="46.4814" x="423.573" y="368.4702">Snapshot</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="28.1284" x="476.1668" y="368.4702">Punkt</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="66.0376" x="510.4075" y="368.4702">Kontinuierlich</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" text-decoration="line-through" textLength="3.6631" x="310.49" y="379.4702">-</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="14.6523" x="314.1531" y="379.4702">----</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" text-decoration="line-through" textLength="3.6631" x="420.5169" y="379.4702">-</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" text-decoration="line-through" textLength="3.6631" x="424.1799" y="379.4702">-</text><text fill="#000000" font-family="Helvetica" font-size="