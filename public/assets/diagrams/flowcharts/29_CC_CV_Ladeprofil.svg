l="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="97.7754" x="610.6123" y="179.9902">(Constant Voltage)</text></g><!--cluster end_charge--><g class="cluster" data-qualified-name="end_charge" data-source-line="22" id="ent0008"><rect fill="#F3E8FD" height="112" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="231" x="758" y="354.52"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="51.3477" x="847.8262" y="364.9902">Ladeende</text></g><!--entity cc_detail--><g class="entity" data-qualified-name="cc.cc_detail" data-source-line="11" id="ent0003"><rect fill="#EFF6FF" height="83" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="172.8667" x="35.57" y="207.52"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="32.3931" x="45.57" y="218.9902">Strom:</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="45.8369" x="81.0192" y="218.9902">konstant</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="51.96" x="129.9123" y="218.9902">(z.B. 45 A)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="53.2168" x="45.57" y="229.9902">Spannung:</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="29.3369" x="101.8429" y="229.9902">steigt</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="64.2007" x="134.236" y="229.9902">kontinuierlich</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="86.2007" x="45.57" y="240.9902">SOC: steigt linear</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="144.9282" x="45.57" y="251.9902">Leistung: steigt mit Spannung</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="3.0562" x="45.57" y="262.9902">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="138.7891" x="45.57" y="273.9902">Dauer: Gro&#223;teil der Ladezeit</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="95.6699" x="45.57" y="284.9902">(SOC 0% &#8594; ~80%)</text></g><!--entity trans_detail--><g class="entity" data-qualified-name="transition.trans_detail" data-source-line="15" id="ent0005"><rect fill="#FEF3C7" height="39" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="142.9229" x="315.54" y="229.52"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="122.9229" x="325.54" y="240.9902">Obere Spannungsgrenze</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="82.2314" x="325.54" y="251.9902">erreicht (~408 V)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="72.7461" x="325.54" y="262.9902">BMS regelt um</text></g><!--entity cv_detail--><g class="entity" data-qualified-name="cv.cv_detail" data-source-line="19" id="ent0007"><rect fill="#F0FDF4" height="83" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="167.6621" x="566.17" y="207.52"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="53.2168" x="576.17" y="218.9902">Spannung:</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="45.8369" x="632.4429" y="218.9902">konstant</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="42.4961" x="681.336" y="218.9902">(~408 V)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="32.3931" x="576.17" y="229.9902">Strom:</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="25.6738" x="611.6192" y="229.9902">sinkt</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="58.7114" x="640.3492" y="229.9902">exponentiell</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="110.6553" x="576.17" y="240.9902">SOC: steigt langsamer</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="120.4307" x="576.17" y="251.9902">Leistung: sinkt mit Strom</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="3.0562" x="576.17" y="262.9902">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="97.5337" x="576.17" y="273.9902">Dauer: Letzte ~20%</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="107.9053" x="576.17" y="284.9902">(SOC ~80% &#8594; 100%)</text></g><!--entity end_detail--><g class="entity" data-qualified-name="end_charge.end_detail" data-source-line="23" id="ent0009"><rect fill="#EDE9FE" height="50" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="163.0483" x="782.48" y="392.52"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="87.4146" x="792.48" y="403.9902">Abschaltkriterium:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="143.0483" x="792.48" y="414.9902">Strom &lt; Schwellwert (~0,5 A)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="89.5791" x="792.48" y="425.9902">oder SOC = 100%</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="110.6768" x="792.48" y="436.9902">oder Timer abgelaufen</text></g><g cla