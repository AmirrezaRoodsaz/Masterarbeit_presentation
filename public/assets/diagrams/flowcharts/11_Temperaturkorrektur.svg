<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="354px" preserveAspectRatio="none" style="width:530px;height:354px;background:#FFFFFF;" version="1.1" viewBox="0 0 530 354" width="530px" zoomAndPan="magnify"><title>&lt;b&gt;Temperaturkorrektur - Normierung auf 25 &#176;C&lt;/b&gt;
&lt;color:red&gt;&lt;b&gt;Status: Deaktiviert (weiterer Forschungsbedarf)&lt;/b&gt;&lt;/color&gt;</title><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="462.3438" x="32.6118" y="31.9404">Temperaturkorrektur - Normierung auf 25 &#176;C</text><text fill="#FF0000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="497.5674" x="15" y="53.9404">Status: Deaktiviert (weiterer Forschungsbedarf)</text></g><ellipse cx="161.738" cy="80" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><path d="M287.7222,100 L287.7222,145 L267.7222,149 L287.7222,153 L287.7222,198 A0,0 0 0 0 287.7222,198 L473.8135,198 A0,0 0 0 0 473.8135,198 L473.8135,110 L463.8135,100 L287.7222,100 A0,0 0 0 0 287.7222,100" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M463.8135,100 L463.8135,110 L473.8135,110 L463.8135,100" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="132.6338" x="293.7222" y="113.4702">Grund der Deaktivierung:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="160.7837" x="293.7222" y="124.4702">Das Temperaturverhalten variiert</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="153.4307" x="293.7222" y="135.4702">stark je nach Zellchemie (NMC,</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="130.8345" x="293.7222" y="146.4702">LFP, NCA), Zelldesign und</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="157.1582" x="293.7222" y="157.4702">Alterungszustand. Eine einzelne</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="165.0913" x="293.7222" y="168.4702">Formel oder Lookup-Tabelle kann</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="152.856" x="293.7222" y="179.4702">diese Vielfalt nicht zuverlaessig</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="44.6499" x="293.7222" y="190.4702">abbilden.</text><rect fill="#FFFFFF" height="53" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="211.9683" x="55.7539" y="122.5"/><text fill="#FF0000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="97.8184" x="65.7539" y="140.9702">Feature deaktiviert</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="191.9683" x="65.7539" y="151.9702">Temperaturkorrektur ist in der aktuellen</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="122.2891" x="65.7539" y="162.9702">Version nicht verfuegbar.</text><path d="M285.7,208 L285.7,253 L265.7,257 L285.7,261 L285.7,306 A0,0 0 0 0 285.7,306 L458.2292,306 A0,0 0 0 0 458.2292,306 L458.2292,218 L448.2292,208 L285.7,208 A0,0 0 0 0 285.7,208" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M448.2292,208 L448.2292,218 L458.2292,218 L448.2292,208" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="136.9038" x="291.7" y="221.4702">Urspruengliches Konzept:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="117.9922" x="291.7" y="232.4702">Arrhenius-Gleichung mit</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="135.7329" x="291.7" y="243.4702">empirischer Lookup-Tabelle</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="151.5293" x="291.7" y="254.4702">(NMC-Zellen, -10&#176;C bis +40&#176;C)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="128.396" x="291.7" y="265.4702">Korrekturfaktor 0,95 - 1,50</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="3.0562" x="291.7" y="276.4702">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="140.0244" x="291.7" y="287.4702">Siehe: Ausblick &amp; Potenziale</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="103.3291" x="291.7" y="298.4702">im Einstellungen-Tab</text><rect fill="#FFFFFF" height="75" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="207.9238" x="57.7761" y="219.5"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="127.7944" x="67.7761" y="237.9702">Offene Forschungsfragen:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="159.7471" x="67.7761" y="248.9702">&#8226; Zellchemie-spezifische Modelle</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="187.9238" x="67.7761" y="259.9702">&#8226; Validierung an realen Fahrzeugdaten</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="169.5493" x="67.7761" y="270.9702">&#8226; Alterungseinfluss auf T-Verhalten</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="141.4209" x="67.7761" y="281.9702">&#8226; BMS-interne Kompensation</text><ellipse cx="161.738" cy="337" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="161.738" cy="337" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="161.738" x2="161.738" y1="90" y2="122.5"/><polygon fill="#000000" points="157.738,112.5,161.73