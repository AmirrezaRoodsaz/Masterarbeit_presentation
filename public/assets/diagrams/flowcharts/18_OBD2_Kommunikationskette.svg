<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1080px" preserveAspectRatio="none" style="width:454px;height:1080px;background:#FFFFFF;" version="1.1" viewBox="0 0 454 1080" width="454px" zoomAndPan="magnify"><title>&lt;b&gt;OBD2-Kommunikationskette&lt;/b&gt;
Vom Steuerger&#228;t zur CSV-Datei</title><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="298.2676" x="73.849" y="31.9404">OBD2-Kommunikationskette</text><text fill="#000000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="327.6367" x="59.1644" y="53.9404">Vom Steuerger&#228;t zur CSV-Datei</text></g><!--entity ecu--><g class="entity" data-qualified-name="ecu" data-source-line="11" id="ent0002"><rect fill="#2C3E50" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="176.5137" x="43.77" y="77"/><text fill="#FFFFFF" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="100.8584" x="53.77" y="95.4702">Steuerger&#228;te (ECU)</text><text fill="#FFFFFF" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="156.5137" x="53.77" y="106.4702">BMS, Gateway, Motorsteuerung</text></g><!--entity can--><g class="entity" data-qualified-name="can" data-source-line="13" id="ent0003"><rect fill="#DBEAFE" height="53" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="144.7007" x="59.68" y="203"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="48.2754" x="69.68" y="221.4702">CAN-Bus</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="124.7007" x="69.68" y="232.4702">(Controller Area Network)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="105.7891" x="69.68" y="243.4702">ISO 11898, 500 kbit/s</text></g><!--entity obd--><g class="entity" data-qualified-name="obd" data-source-line="15" id="ent0004"><rect fill="#BFDBFE" height="53" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="144.126" x="59.97" y="340"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="99.6284" x="69.97" y="358.4702">OBD2-Schnittstelle</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="124.126" x="69.97" y="369.4702">(SAE J1962 / ISO 15765)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="116.7998" x="69.97" y="380.4702">16-Pin Diagnosebuchse</text></g><!--entity elm--><g class="entity" data-qualified-name="elm" data-source-line="17" id="ent0005"><rect fill="#D1FAE5" height="64" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="180.7515" x="41.65" y="477"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="86.7969" x="51.65" y="495.4702">ELM327-Adapter</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="80.3784" x="51.65" y="506.4702">(OBD Link MX+)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="160.7515" x="51.65" y="517.4702">AT-Kommandos &#8594; CAN-Frames</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="88.6768" x="51.65" y="528.4702">Bluetooth 4.0 BLE</text></g><!--entity app--><g class="entity" data-qualified-name="app" data-source-line="19" id="ent0006"><rect fill="#A7F3D0" height="64" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="165.5083" x="49.28" y="669.5"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="105.7354" x="59.28" y="687.9702">Smartphone / Tablet</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="111.8799" x="59.28" y="698.9702">(Car Scanner Pro App)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="120.1406" x="59.28" y="709.9702">PID-Abfrage alle ~80 ms</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="145.5083" x="59.28" y="720.9702">Protokolliert alle BMS-Signale</text></g><!--entity csv--><g class="entity" data-qualified-name="csv" data-source-line="21" id="ent0007"><rect fill="#FFF3CD" height="53" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="240.0591" x="12" y="862"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="53.1792" x="22" y="880.4702">CSV-Datei</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="220.0591" x="22" y="891.4702">(Langformat: SECONDS;PID;VALUE;UNITS)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="167.5674" x="22" y="902.4702">Alle aufgezeichneten Sensordaten</text></g><!--entity sw--><g class="entity" data-qualified-name="sw" data-source-line="23" id="ent0008"><rect fill="#F3E8FD" height="64" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="169.1606" x="47.45" y="1010"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="119.8076" x="57.45" y="1028.4702">SOH-Analyse-Software</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="99.0483" x="57.45" y="1039.4702">(Python-Applikation)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="132.6499" x="57.45" y="1050.4702">Pro-Modus (Streamlit) oder</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="149.1606" x="57.45" y="1061.4702">Easy-Modus (React Web-App)</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="35" id="ent0016"><path d="M250.09,629 L250.09,697.5 L215.1,701.5 L250.09,705.5 L250.09,774 A4,4 0 0 0 254.09,778 L443.9655,778 A4,4 0 0 0 447.9655,774 L447.9655,635 L437.9655,625 L254.09,625 A4,4 0 0 0 250.09,629" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M437.9655,625 L437.9655,633 A2,2 0 0 0 439.9655,635 L447.9655,635 L437.9655,625" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="168.0776" x="256.09" y="638.4702">Aufgezeichnete PIDs (Auswahl):</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="167.084" x="256.09" y="649.4702">&#8226; [8C.BMS] Ladezustand BMS (%)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="160.9824" x="256.09" y="660.4702">&#8226; [8C.BMS] Batteriespannung (V)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="140.1587" x="256.09" y="671.4702">&#8226; [8C.BMS] Batteriestrom (A)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="170.8545" x="256.09" y="682.4702">&#8226; [8C.BMS] Batterietemperatur (&#176;C)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="176.8755" x="256.09" y="693.4702">&#8226; [19.Gate] Max. Energiegehalt (Wh)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="153.624" x="256.09" y="704.4702">&#8226; [8C.BMS] Max. Kapazit&#228;t (Ah)</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="3.0562" x="256.09" y="715.4702">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="64.7861" x="256.09" y="726.4702">Abtastraten:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="71.8276" x="256.09" y="737.4702">Strom: ~80 ms</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="98.769" x="256.09" y="748.4702">Spannung: ~200 ms</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="72.4453" x="256.09" y="759.4702">SOC: ~500 ms</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="84.063" x="256.09" y="770.4702">Temperatur: ~1 s</text></g><!--link ecu to can--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="26" id="lnk9"><path d="M132.03,119.23 C132.03,141.71 132.03,172.07 132.03,196.6" fill="none" id="ecu-to-can" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="132.03,202.6,136.03,193.6,132.03,197.6,128.03,193.6,132.03,202.6" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="64.1685" x="148.1738" y="158.4702">CAN-Frames</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="94.4561" x="133.03" y="169.4702">(ID + 8 Byte Daten)</text></g><!--link can to obd--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="27" id="lnk10"><path d="M132.03,256.21 C132.03,280.23 132.03,309.89 132.03,333.89" fill="none" id="can-to-obd" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="132.03,339.89,136.03,330.89,132.03,334.89,128.03,330.89,132.03,339.89" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="69.6846" x="133.03" y="295.4702">UDS-Protokoll</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="59.9199" x="137.9123" y="306.4702">(ISO 14229)</text></g><!--link obd to elm--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="28" id="lnk11"><path d="M132.03,393.27 C132.03,416.8 132.03,4