family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="178.5513" x="297.6555" y="378.4702">Kapazit&#228;tsbasierten SOH berechnen</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="172.7397" x="297.6555" y="389.4702">Q_aktuell bei SOC &gt; 90% auslesen</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="185.8774" x="297.6555" y="400.4702">SOH = Q_aktuell / Q_nominal &#215; 100%</text><rect fill="#000000" height="6" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="769.1885" x="6" y="433"/><rect fill="#FFFFFF" height="31" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="104.9976" x="144.5021" y="459"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="84.9976" x="154.5021" y="477.4702">SOHe berechnen</text><polygon fill="#FFFFFF" points="134.1761,510,259.8256,510,271.8256,522,259.8256,534,134.1761,534,122.1761,522,134.1761,510" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="10" lengthAdjust="spacing" textLength="125.6494" x="134.1761" y="524.7002">E_actual Spalte vorhanden?</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="8.5615" x="113.6146" y="519.4702">ja</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="20.7969" x="271.8256" y="519.4702">nein</text><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="168.8867" x="18" y="544"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="148.8867" x="28" y="562.4702">SOHe = E_aktuell / E_nominal</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="86.2061" x="28" y="573.4702">(direkte Methode)</text><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;