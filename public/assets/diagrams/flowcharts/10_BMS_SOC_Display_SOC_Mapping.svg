<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="836px" preserveAspectRatio="none" style="width:1024px;height:836px;background:#FFFFFF;" version="1.1" viewBox="0 0 1024 836" width="1024px" zoomAndPan="magnify"><title>&lt;b&gt;BMS-SOC &#8596; Display-SOC Umrechnung&lt;/b&gt;
Lineare Regression mit Plausibilit&#228;tspr&#252;fung</title><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="412.6053" x="304.4728" y="31.9404">BMS-SOC &#8596; Display-SOC Umrechnung</text><text fill="#000000" font-family="Helvetica" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="468.1982" x="276.6763" y="53.9404">Lineare Regression mit Plausibilit&#228;tspr&#252;fung</text></g><ellipse cx="710.4168" cy="80" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="177.1582" x="621.8377" y="110"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="157.1582" x="631.8377" y="128.4702">Beide SOC-Spalten vorhanden?</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="134.7661" x="631.8377" y="139.4702">(BMS-SOC + Display-SOC)</text><polygon fill="#FFFFFF" points="645.5877,172,775.2459,172,787.2459,184,775.2459,196,645.5877,196,633.5877,184,645.5877,172" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="129.6582" x="645.5877" y="186.9702">Beide Spalten vorhanden?</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="8.5615" x="625.0262" y="181.4702">ja</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="20.7969" x="787.2459" y="181.4702">nein</text><rect fill="#FFFFFF" height="31" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="125.166" x="452.2813" y="206"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="105.166" x="462.2813" y="224.4702">NaN-Zeilen entfernen</text><polygon fill="#FFFFFF" points="450.6878,268,579.0408,268,591.0408,280,579.0408,292,450.6878,292,438.6878,280,450.6878,268" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="128.353" x="450.6878" y="282.9702">&#8805; 10 g&#252;ltige Datenpunkte?</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="8.5615" x="430.1263" y="277.4702">ja</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="20.7969" x="591.0408" y="277.4702">nein</text><rect fill="#FFFFFF" height="53" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="238.5605" x="196.0245" y="302"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="150.4336" x="206.0245" y="320.4702">Lineare Regression berechnen</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="218.5605" x="206.0245" y="331.4702">SOC_BMS = scale &#215; SOC_Display + offset</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="111.8745" x="206.0245" y="342.4702">(numpy.polyfit, Grad 1)</text><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="118.3984" x="256.1056" y="375"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="66.6499" x="266.1056" y="393.4702">R&#178; berechnen</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="98.3984" x="266.1056" y="404.4702">(Bestimmtheitsma&#223;)</text><polygon fill="#FFFFFF" points="235.8046,437,394.8051,437,406.8051,459,394.8051,481,235.8046,481,223.8046,459,235.8046,437" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="159.0005" x="235.8046" y="445.4702">Plausibilit&#228;tspr&#252;fung bestanden?</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="72.1499" x="235.8046" y="456.4702">scale: 0,5 - 1,2</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="84.3906" x="235.8046" y="467.4702">offset: &#8722;5 bis +20</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="45.5522" x="235.8046" y="478.4702">R&#178; &gt; 0,95</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="8.5615" x="215.243" y="456.4702">ja</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="20.7969" x="406.8051" y="456.4702">nein</text><rect fill="#FFFFFF" height="31" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="132.4976" x="47.8999" y="491"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="112.4976" x="57.8999" y="509.4702">Auto-Detect erfolgreich</text><path d="M242.2974,547 L242.2974,575.5 L222.2974,579.5 L242.2974,583.5 L242.2974,612 A0,0 0 0 0 242.2974,612 L412.4795,612 A0,0 0 0 0 412.4795,612 L412.4795,557 L402.4795,547 L242.2974,547 A0,0 0 0 0 242.2974,547" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M402.4795,547 L402.4795,557 L412.4795,557 L402.4795,547" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="128.9707" x="248.2974" y="560.4702">Typische Werte VW ID.4:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="71.8599" x="248.2974" y="571.4702">scale = 0,9025</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="70.6299" x="248.2974" y="582.4702">offset = 5,75%</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="139.6968" x="248.2974" y="593.4702">&#8594; Display 0% = BMS 5,75%</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="149.1821" x="248.2974" y="604.4702">&#8594; Display 100% = BMS ~96%</text><rect fill="#FFFFFF" height="53" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="216.2974" x="6" y="553"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="87.4468" x="16" y="571.4702">Puffer berechnen:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="107.3145" x="16" y="582.4702">buffer_bottom = offset</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="196.2974" x="16" y="593.4702">buffer_top = 100 &#8722; (scale &#215; 100 + offset)</text><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="167.9629" x="432.4795" y="491"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="88.0483" x="442.4795" y="509.4702">Werte unplausibel</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="147.9629" x="442.4795" y="520.4702">&#8594; Fallback auf Standardwerte</text><polygon fill="#FFFFFF" points="315.3048,618,327.3048,630,315.3048,642,303.3048,630,315.3048,618" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="167.9629" x="624.6327" y="302"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="116.1875" x="634.6327" y="320.4702">Zu wenige Datenpunkte</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="147.9629" x="634.6327" y="331.4702">&#8594; Fallback auf Standardwerte</text><polygon fill="#FFFFFF" points="514.8643,648,526.8643,660,514.8643,672,502.8643,660,514.8643,648" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="42" rx="4" ry="4" style="stroke:#000000;stroke-width:1;" width="178.3667" x="822.5956" y="206"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="158.3667" x="832.5956" y="224.4702">Nur eine SOC-Spalte vorhanden</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="142.4683" x="832.5956" y="235.4702">&#8594; Standardwerte verwenden</text><polygon fill="#FFFFFF" points="710.4168,678,722.4168,690,710.4168,702,698.4168,690,710.4168,678" style="stroke:#000000;stroke-width:1;"/><path d="M802.1763,712 L802.1763,746 L782.1763,750 L802.1763,754 L802.1763,788 A0,0 0 0 0 802.1763,788 L1017.5508,788 A0,0 0 0 0 1017.5508,788 L1017.5508,722 L1007.5508,712 L802.1763,712 A0,0 0 0 0 802.1763,712" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1007.5508,712 L1007.5508,722 L1017.5508,722 L1007.5508,712" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="117.9546" x="808.1763" y="725.4702">Umrechnungsformeln:</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="150.0952" x="808.1763" y="736.4702">BMS = scale &#215; Display + offset</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="154.0537" x="808.1763" y="747.4702">Display = (BMS &#8722; offset) / scale</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="3.0562" x="808.1763" y="758.4702">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="149.1392" x="808.1763" y="769.4702">SOH-Berechnung verwendet</text><text fill="#000000" font-family="Helvetica" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="88.0161" x="